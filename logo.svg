<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="192" height="192" fill="url(#bgGradient)" rx="24"/>
  
  <!-- Softball/Baseball with glow -->
  <circle cx="96" cy="96" r="60" fill="url(#ballGradient)" filter="drop-shadow(0 0 10px rgba(0, 242, 254, 0.6))"/>
  
  <!-- Stitching lines -->
  <path d="M 50 80 Q 70 96, 50 112" stroke="#1e1b4b" stroke-width="3" fill="none"/>
  <path d="M 142 80 Q 122 96, 142 112" stroke="#1e1b4b" stroke-width="3" fill="none"/>
  
  <!-- Letter A -->
  <text x="96" y="115" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" text-anchor="middle" fill="#1e1b4b">A</text>
</svg>
